<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      width: 260px;
      padding: 14px;
      background: #fff;
      color: #1a1a1a;
    }
    h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 4px;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
    }
    .status-row:last-of-type { border-bottom: none; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
    }
    .dot.green  { background: #4caf50; }
    .dot.red    { background: #f44336; }
    .dot.yellow { background: #ff9800; }
    .label  { color: #666; font-size: 12px; }
    .value  { font-weight: 500; margin-left: auto; font-size: 12px; }
    .info-box {
      margin-top: 10px;
      background: #f8f8f8;
      border-radius: 5px;
      padding: 8px;
    }
    .info-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .info-row:last-child { margin-bottom: 0; }
    .info-label { color: #888; font-size: 11px; }
    .info-val   { font-size: 11px; font-family: monospace; word-break: break-all; text-align: right; max-width: 160px; }
    .last-activity { margin-top: 10px; font-size: 11px; color: #aaa; text-align: right; }
  </style>
</head>
<body>
  <h3>FDE Bridge <span class="badge">v1.0</span></h3>

  <div class="status-row">
    <div class="dot" id="native-dot"></div>
    <span class="label">Native host</span>
    <span class="value" id="native-status">—</span>
  </div>
  <div class="status-row">
    <div class="dot" id="tab-dot"></div>
    <span class="label">FDE tab</span>
    <span class="value" id="tab-status">—</span>
  </div>

  <div class="info-box">
    <div class="info-row">
      <span class="info-label">Endpoint</span>
      <span class="info-val">127.0.0.1:27182</span>
    </div>
    <div class="info-row">
      <span class="info-label">Config</span>
      <span class="info-val" id="config-status">none</span>
    </div>
  </div>

  <div class="last-activity" id="last-activity"></div>

  <script src="popup.js"></script>
</body>
</html>
